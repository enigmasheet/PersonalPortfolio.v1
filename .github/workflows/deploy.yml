name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SLNX: PersonalPortfolio.v1.slnx
  PUBLISH_DIR: bin/Release/net10.0/publish/wwwroot

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          workloads: wasm-tools

      - name: Publish
        run: dotnet publish ${{ env.SLNX }} -c Release

      - name: Deploy to enigmasheet/portfolio (GitHub Pages)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository-name: enigmasheet/portfolio
          branch: main
          folder: ${{ env.PUBLISH_DIR }}
          clean: true
          single-commit: true
