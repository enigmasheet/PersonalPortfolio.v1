    <style>
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg, #fafafa);
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--mud-palette-tablelines, #e5e5e5);
            border-top-color: var(--mud-palette-primary, #5a52e0);
            border-radius: 50%;
            animation: loaderSpin 0.8s linear infinite;
        }
        @keyframes loaderSpin {
            to { transform: rotate(360deg); }
        }
        #app {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #app.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <output id="loader" aria-busy="true" role="status">
        <div class="loader-spinner"></div>
    </output>

    <script>
        globalThis.__destroyLoader = function () {};
    </script>

    <div id="app">
        <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">Abhay Kumar Mandal</h1>
